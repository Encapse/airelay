name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Run unit tests
        run: go test ./...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: airelay
          POSTGRES_PASSWORD: airelay
          POSTGRES_DB: airelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: Run migrations
        env:
          DATABASE_URL: postgres://airelay:airelay@localhost:5432/airelay?sslmode=disable
        run: goose -dir db/migrations postgres "$DATABASE_URL" up
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://airelay:airelay@localhost:5432/airelay?sslmode=disable
          REDIS_URL: redis://localhost:6379
          CREDENTIAL_ENCRYPTION_KEY: integration-test-enckey-32bytes!
          JWT_SECRET: integration-test-jwt-secret
        run: go test -tags integration -v ./...
